<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1d1d1f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="工单管理">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="工单管理">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <title>工单管理系统</title>
  <style>
    /* ========== Design Tokens ========== */
    :root {
      --bg: #f5f5f7;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-solid: #ffffff;
      --surface-hover: rgba(255, 255, 255, 0.90);
      --border: rgba(0, 0, 0, 0.06);
      --border-strong: rgba(0, 0, 0, 0.10);
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #86868b;
      --accent: #000000;
      --accent-subtle: #1d1d1f;
      --radius: 16px;
      --radius-sm: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
      --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 16px 48px rgba(0,0,0,0.08);
      --transition: all 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ========== Page Transition System ========== */
    .page-wrapper {
      transition: transform 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                  opacity 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                  filter 400ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .page-wrapper.exit-left {
      transform: translateX(-40%);
      opacity: 0;
      filter: blur(8px);
    }

    /* ========== Depth Layers ========== */
    .depth-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,0,0,0.03) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transition: transform 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                  opacity 400ms cubic-bezier(0.25, 0.1, 0.25, 1),
                  filter 400ms cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    .exit-left .depth-bg {
      transform: scale(0.95);
      filter: blur(4px);
      opacity: 0;
    }

    /* ========== Container ========== */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* ========== Enter Animation (Stagger) ========== */
    body.page-enter .stagger-item {
      animation: enterSlide 500ms cubic-bezier(0.25, 0.1, 0.25, 1) both;
    }

    body.page-enter .stagger-0 { animation-delay: 0ms; }
    body.page-enter .stagger-1 { animation-delay: 60ms; }
    body.page-enter .stagger-2 { animation-delay: 120ms; }

    @keyframes enterSlide {
      from {
        transform: translateX(40%);
        opacity: 0;
        filter: blur(12px);
      }
      to {
        transform: translateX(0);
        opacity: 1;
        filter: blur(0);
      }
    }

    /* Initial state before animation triggers */
    body:not(.page-enter) .stagger-item {
      animation: none;
    }

    /* ========== Header ========== */
    header {
      text-align: center;
      padding: 0 0 64px;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 2px;
      background: var(--accent);
      opacity: 0.15;
    }

    header .header-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      margin-bottom: 24px;
      background: var(--surface-solid);
      transition: var(--transition);
      box-shadow: var(--shadow);
    }

    header .header-icon svg {
      width: 26px; height: 26px;
      color: var(--accent);
      stroke-width: 1.5;
    }

    header h1 {
      font-size: 36px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    header p {
      color: var(--text-secondary);
      font-size: 15px;
      margin-top: 12px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    /* ========== Card Grid ========== */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      width: 100%;
      max-width: 700px;
    }

    /* ========== Nav Card ========== */
    .nav-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      background: var(--surface);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
      position: relative;
      overflow: hidden;
    }

    .nav-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.02) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .nav-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--border-strong);
    }

    .nav-card:hover::before {
      opacity: 1;
    }

    .nav-card:active {
      transform: translateY(-1px) scale(0.98);
      transition: all 0.15s ease;
    }

    .nav-card .card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      border-radius: 16px;
      background: var(--surface-solid);
      border: 1px solid var(--border);
      margin-bottom: 24px;
      transition: var(--transition);
      position: relative;
      z-index: 1;
    }

    .nav-card:hover .card-icon {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .nav-card:hover .card-icon svg {
      color: #fff;
    }

    .nav-card .card-icon svg {
      width: 28px; height: 28px;
      color: var(--accent);
      stroke-width: 1.5;
      transition: var(--transition);
    }

    .nav-card .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.01em;
      position: relative;
      z-index: 1;
    }

    .nav-card .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      letter-spacing: 0.02em;
      position: relative;
      z-index: 1;
    }

    .nav-card .card-arrow {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 20px; height: 20px;
      opacity: 0;
      transform: translateX(-8px);
      transition: all 0.3s ease;
    }

    .nav-card:hover .card-arrow {
      opacity: 0.4;
      transform: translateX(0);
    }

    .nav-card .card-arrow svg {
      width: 20px; height: 20px;
      color: var(--text-secondary);
      stroke-width: 1.5;
    }

    /* ========== Subtle hint ========== */
    .nav-hint {
      margin-top: 32px;
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
    }

    /* ========== Responsive ========== */
    @media (max-width: 600px) {
      .card-grid {
        grid-template-columns: 1fr;
        max-width: 400px;
      }
      .container { padding: 0 20px; }
      header h1 { font-size: 28px; }
      header { padding: 0 0 48px; }
      .nav-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <div class="depth-bg"></div>
  <div class="page-wrapper" id="pageWrapper">
    <div class="container">
      <header class="stagger-item stagger-0">
        <div class="header-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M15 2H9a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>
        </div>
        <h1>工单管理系统</h1>
        <p>高效记录与追踪每日咨询工单</p>
      </header>

      <div class="card-grid">
        <a class="nav-card stagger-item stagger-1" href="工单管理-本周.html" onclick="return navigateTo(event, '工单管理-本周.html', 'fromHome')">
          <div class="card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M16 2v4"/><path d="M8 2v4"/><path d="M3 10h18"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
          </div>
          <div class="card-title">本周工单表</div>
          <div class="card-desc">查看本周各渠道工单统计与资源情况</div>
        </a>

        <a class="nav-card stagger-item stagger-2" href="工单管理-总表.html" onclick="return navigateTo(event, '工单管理-总表.html', 'fromHome')">
          <div class="card-arrow">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
          </div>
          <div class="card-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div class="card-title">工单总表</div>
          <div class="card-desc">浏览、搜索、编辑全部工单数据</div>
        </a>
      </div>

      <div class="nav-hint stagger-item stagger-2">点击卡片进入对应功能页面</div>
    </div>
  </div>

  <script>
    // ========== Page Transition Animation ==========
    function navigateTo(event, targetUrl, direction) {
      event.preventDefault();
      sessionStorage.setItem('pageAnim', direction);

      const wrapper = document.getElementById('pageWrapper');
      wrapper.classList.add('exit-left');

      setTimeout(() => {
        window.location.href = targetUrl;
      }, 400);
      return false;
    }

    // ========== Enter Animation on Load ==========
    document.addEventListener('DOMContentLoaded', () => {
      const animDir = sessionStorage.getItem('pageAnim');

      // If coming from another page, play enter animation
      if (animDir && animDir !== 'fromHome') {
        document.body.classList.add('page-enter');
      } else {
        // First load - simple fade in
        document.body.classList.add('page-enter');
        // Override animation for fresh load
        const style = document.createElement('style');
        style.textContent = `
          @keyframes enterSlide {
            from { transform: translateY(16px); opacity: 0; filter: blur(6px); }
            to { transform: translateY(0); opacity: 1; filter: blur(0); }
          }
        `;
        document.head.appendChild(style);
      }

      // Clean up after animation
      setTimeout(() => {
        sessionStorage.removeItem('pageAnim');
      }, 1000);
    });
  </script>
  <!-- PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('SW registered:', reg.scope))
        .catch((err) => console.log('SW failed:', err));
    }
  </script>
</body>
</html>
